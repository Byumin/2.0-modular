<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>검사 결과 페이지 · 리디자인</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    html, body, #root { height: 100%; margin: 0; }
    body { font-family: 'Pretendard', 'Noto Sans KR', system-ui, sans-serif; }
    .animate-in { animation: dc-fade-in 0.18s cubic-bezier(0.22, 1, 0.36, 1) both; }
    @keyframes dc-fade-in { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
    .slide-in-from-right { animation: dc-slide-right 0.22s cubic-bezier(0.22, 1, 0.36, 1) both; }
    @keyframes dc-slide-right { from { opacity: 0.5; transform: translateX(24px); } to { opacity: 1; transform: none; } }
    .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .duration-200 { animation-duration: 0.2s; }
    .dc-artboard-host { overflow: hidden; border-radius: 12px; }
  </style>
</head>
<body class="bg-[#f0eee9]">
  <div id="root"></div>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Data + components -->
  <script src="data/mockResults.js"></script>
  <script type="text/babel" src="components/shared.jsx"></script>
  <script type="text/babel" src="components/variantA.jsx"></script>
  <script type="text/babel" src="design-canvas.jsx"></script>

  <script type="text/babel">
    function App() {
      const report = window.MOCK_REPORT;

      return (
        <DesignCanvas>
          <DCSection
            id="result-page"
            title="검사 결과 페이지"
            subtitle="K-PSI-4-SF / PAT-2 / PCT 결과 데이터. 검사별 탭 + 척도 방향성 기반 색상 + drill-down 디테일 패널."
          >
            <DCArtboard
              id="variant-a"
              label="검사별 탭 결과 페이지"
              width={1280}
              height={1600}
            >
              <div className="dc-artboard-host w-full h-full">
                <VariantA report={report} />
              </div>
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
