<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>인적 정보 입력</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <main class="page">
      <section class="card">
        <p class="eyebrow">STEP 1</p>
        <h1>인적 정보 입력</h1>
        <p class="sub">검사 시작 전 기본 정보를 입력해주세요.</p>

        <form id="profileForm" class="form" novalidate>
          <label for="name">이름</label>
          <input id="name" name="name" type="text" placeholder="이름을 입력하세요" required />

          <label>성별</label>
          <div class="gender-group" role="radiogroup" aria-label="성별">
            <label class="radio-pill">
              <input type="radio" name="gender" value="male" />
              <span>남</span>
            </label>
            <label class="radio-pill">
              <input type="radio" name="gender" value="female" />
              <span>여</span>
            </label>
          </div>

          <div class="field-head">
            <label for="birth_day_display">생년월일</label>
            <span id="ageInfoBadge" class="age-badge hidden" aria-live="polite"></span>
          </div>
          <div class="birth-wrap">
            <input
              id="birth_day_display"
              type="text"
              placeholder="YYYYMMDD"
              inputmode="numeric"
              maxlength="8"
              autocomplete="bday"
              required
            />
            <input id="birth_day" name="birth_day" type="hidden" required />
            <button id="datePickerToggle" class="icon-btn" type="button" aria-label="생년월일 선택">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M7 2a1 1 0 0 1 1 1v1h8V3a1 1 0 1 1 2 0v1h1a3 3 0 0 1 3 3v11a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V7a3 3 0 0 1 3-3h1V3a1 1 0 0 1 1-1Zm13 9H4v7a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-7ZM5 6a1 1 0 0 0-1 1v2h16V7a1 1 0 0 0-1-1H5Z"/>
              </svg>
            </button>
            <div id="datePickerPanel" class="date-panel hidden" role="dialog" aria-label="생년월일 선택">
              <div class="date-selects">
                <select id="yearSelect" aria-label="년"></select>
                <select id="monthSelect" aria-label="월"></select>
                <select id="daySelect" aria-label="일"></select>
              </div>
            </div>
          </div>
          <p id="birthError" class="field-info" aria-live="polite"></p>

          <label for="school_age">학령</label>
          <select id="school_age" name="school_age" required>
            <option value="" selected disabled>학령을 선택하세요</option>
            <option>미취학</option>
            <option>초등 1학년</option>
            <option>초등 2학년</option>
            <option>초등 3학년</option>
            <option>초등 4학년</option>
            <option>초등 5학년</option>
            <option>초등 6학년</option>
            <option>중등 1학년</option>
            <option>중등 2학년</option>
            <option>중등 3학년</option>
            <option>고등 1학년</option>
            <option>고등 2학년</option>
            <option>고등 3학년</option>
            <option>초등학교 졸업생</option>
            <option>중학교 졸업생</option>
            <option>고등학교 졸업생</option>
            <option>대학생 신입생</option>
            <option>대학생 재학생</option>
            <option>대학생 졸업생</option>
            <option>대학원 신입생</option>
            <option>대학원 재학생</option>
            <option>대학원 졸업생</option>
          </select>

          <button id="nextBtn" type="submit">다음</button>
          <p id="message" class="message" aria-live="polite"></p>
        </form>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
