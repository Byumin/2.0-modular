<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>전체 내담자 관리</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body data-page="admin-clients">
    <main class="page dashboard-page">
      <section class="card dashboard-card">
        <header class="dashboard-topbar">
          <div>
            <p class="eyebrow">CLIENT MANAGEMENT</p>
            <h1>전체 내담자 관리</h1>
            <p class="sub">등록, 수정, 삭제 및 내담자 진행 상태를 관리합니다.</p>
          </div>
          <div class="row-actions top-actions">
            <a class="ghost-btn" href="/admin/workspace">대시보드</a>
          </div>
        </header>

        <section class="panel-block panel-card client-input-panel">
          <div class="panel-title-row">
            <h2>내담자 정보 입력</h2>
            <div class="row-actions client-form-top-actions">
              <button id="clientSaveBtn" type="submit" form="clientForm" class="uniform-btn">내담자 저장</button>
              <button id="clientCancelBtn" type="button" class="outline-btn uniform-btn hidden">수정 취소</button>
            </div>
          </div>
          <form id="clientForm" class="form client-form-grid" novalidate>
            <input type="hidden" id="client_id" />

            <div class="client-compact-field">
              <label for="client_name">이름</label>
              <input id="client_name" type="text" maxlength="50" required />
            </div>

            <div class="client-compact-field">
              <label for="client_gender">성별</label>
              <select id="client_gender" required>
                <option value="" selected disabled>성별 선택</option>
                <option value="male">남</option>
                <option value="female">여</option>
              </select>
            </div>

            <div class="client-compact-field">
              <label for="client_birth_day">생년월일</label>
              <input id="client_birth_day" type="date" />
            </div>

            <div class="client-memo-field">
              <label for="client_memo">메모</label>
              <input id="client_memo" type="text" maxlength="500" placeholder="상담 메모" />
            </div>

            <p id="clientMessage" class="message full-row" aria-live="polite"></p>
          </form>
        </section>

        <section class="panel-block panel-card">
          <div class="panel-title-row">
            <h2>내담자 목록</h2>
          </div>
          <div id="clientEmpty" class="info-box hidden">등록된 내담자가 없습니다.</div>
          <div class="scroll-area list-scroll">
            <ul id="clientList" class="simple-list client-list"></ul>
          </div>
        </section>
      </section>
    </main>

    <div id="clientResultModal" class="modal-backdrop hidden" role="dialog" aria-modal="true" aria-labelledby="clientResultTitle">
      <section class="modal-card client-result-modal">
        <div class="panel-title-row">
          <h2 id="clientResultTitle">내담자 검사 결과</h2>
          <button id="clientResultCloseTopBtn" type="button" class="outline-btn uniform-btn">닫기</button>
        </div>
        <div class="info-box">
          <p id="clientResultSummary" class="client-result-summary-text">-</p>
        </div>
        <div class="simple-list client-result-info-list">
          <div class="list-item"><strong>내담자</strong><p id="clientResultName">-</p></div>
          <div class="list-item"><strong>배정 검사</strong><p id="clientResultTest">-</p></div>
          <div class="list-item"><strong>최근 실시일</strong><p id="clientResultDate">-</p></div>
          <div class="list-item"><strong>진행 상태</strong><p id="clientResultStatus">-</p></div>
        </div>
        <div class="row-actions">
          <button id="clientResultCloseBtn" type="button" class="outline-btn uniform-btn">닫기</button>
        </div>
      </section>
    </div>

    <script src="/static/admin.js"></script>
  </body>
</html>
