<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>전체 내담자 관리</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body data-page="admin-clients">
    <main class="page dashboard-page">
      <section class="card dashboard-card">
        <header class="dashboard-topbar">
          <div>
            <p class="eyebrow">CLIENT MANAGEMENT</p>
            <h1>전체 내담자 관리</h1>
            <p class="sub">등록, 수정, 삭제 및 내담자 진행 상태를 관리합니다.</p>
          </div>
          <div class="row-actions top-actions">
            <a class="ghost-btn" href="/admin/workspace">대시보드</a>
          </div>
        </header>

        <section class="panel-block panel-card client-search-panel">
          <div class="panel-title-row">
            <h2>내담자 검색</h2>
            <div class="row-actions manage-top-actions">
              <button id="clientSearchBtn" type="submit" form="clientFilterForm" class="uniform-btn">검색</button>
              <button id="clientSearchResetBtn" type="button" class="outline-btn uniform-btn">검색 초기화</button>
              <button id="openClientCreateBtn" type="button" class="outline-btn uniform-btn">내담자 저장</button>
            </div>
          </div>
          <form id="clientFilterForm" class="form grid-2 client-filter-form" novalidate>
            <div>
              <label for="client_filter_q">이름/메모</label>
              <input id="client_filter_q" type="text" maxlength="120" placeholder="이름 또는 메모로 검색" />
            </div>

            <div>
              <label for="client_filter_gender">성별</label>
              <select id="client_filter_gender">
                <option value="">전체</option>
                <option value="male">남</option>
                <option value="female">여</option>
              </select>
            </div>

            <div>
              <label for="client_filter_status">상태</label>
              <select id="client_filter_status">
                <option value="">전체</option>
                <option value="미실시">미실시</option>
                <option value="완료">완료</option>
              </select>
            </div>

            <div>
              <label for="client_filter_test">배정 검사</label>
              <input id="client_filter_test" type="text" maxlength="120" placeholder="배정 검사명으로 검색" />
            </div>
          </form>
        </section>

        <section class="panel-block panel-card">
          <div class="panel-title-row">
            <h2>내담자 목록</h2>
            <div class="row-actions top-actions">
              <button id="deleteSelectedClientsBtn" type="button" class="outline-btn danger-outline uniform-btn" disabled>선택 삭제</button>
            </div>
          </div>
          <div id="clientEmpty" class="info-box hidden">등록된 내담자가 없습니다.</div>
          <div id="clientListHead" class="row-head row-grid client-row-grid client-list-head hidden">
            <div><input id="clientSelectAll" type="checkbox" aria-label="전체 선택" /></div>
            <div>이름</div>
            <div>진행한 검사</div>
            <div>최근 검사일</div>
            <div>상태</div>
            <div>상세</div>
          </div>
          <div class="scroll-area list-scroll client-list-scroll">
            <ul id="clientList" class="row-list client-list"></ul>
          </div>
        </section>
      </section>
    </main>

    <div id="clientFormModal" class="modal-backdrop hidden" aria-hidden="true">
      <section class="modal-card client-form-modal" role="dialog" aria-modal="true" aria-labelledby="clientFormTitle">
        <div class="panel-title-row">
          <h2 id="clientFormTitle">내담자 저장</h2>
          <button id="closeClientFormModalTopBtn" type="button" class="outline-btn uniform-btn">닫기</button>
        </div>
        <form id="clientForm" class="form create-test-form client-modal-form" novalidate>
          <input type="hidden" id="client_id" />
          <section class="modal-section-card">
            <div class="modal-section-head">
              <h3>기본 정보 입력</h3>
              <p>필수 항목 입력 후 저장하세요.</p>
            </div>
            <div class="modal-section-body form grid-2 client-modal-grid">
              <div>
                <label for="client_name">이름</label>
                <input id="client_name" type="text" maxlength="50" required />
              </div>
              <div>
                <label for="client_gender">성별</label>
                <select id="client_gender" required>
                  <option value="" selected disabled>성별 선택</option>
                  <option value="male">남</option>
                  <option value="female">여</option>
                </select>
              </div>
              <div>
                <label for="client_birth_day">생년월일</label>
                <input id="client_birth_day" type="date" />
              </div>
              <div>
                <label for="client_memo">메모</label>
                <input id="client_memo" type="text" maxlength="500" placeholder="상담 메모" />
              </div>
            </div>
          </section>
          <p id="clientMessage" class="message" aria-live="polite"></p>
          <div class="row-actions modal-action-footer">
            <button id="clientSaveBtn" type="submit" class="uniform-btn primary-action">내담자 저장</button>
            <button id="clientCancelBtn" type="button" class="outline-btn uniform-btn quiet-action">닫기</button>
          </div>
        </form>
      </section>
    </div>

    <script src="/static/admin.js"></script>
  </body>
</html>
