<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>검사 리포트 보기</title>
    <style>
      :root {
        --viewer-bg: #e9edf2;
        --panel-bg: #ffffff;
        --panel-border: #d6dde7;
        --text-main: #223047;
        --text-sub: #5d6b82;
        --accent: #a76a24;
        --summary-soft: #fffaf3;
        --summary-border: #ead8bf;
        --summary-hover: rgba(167, 106, 36, 0.06);
        --summary-strong: #6f4312;
        --summary-toggle: #9a6424;
        --summary-score: var(--accent);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: linear-gradient(180deg, #f4f7fb 0%, var(--viewer-bg) 100%);
        color: var(--text-main);
        font-family: "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", sans-serif;
      }

      .viewer-shell {
        width: min(1820px, calc(100vw - 24px));
        margin: 12px auto;
        display: grid;
        gap: 8px;
      }

      .viewer-top {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        padding: 0 2px;
      }

      .viewer-title {
        margin: 0;
        font-size: 15px;
        line-height: 1.4;
      }

      .viewer-sub {
        margin: 0;
        font-size: 12px;
        color: var(--text-sub);
      }

      .viewer-layout {
        display: grid;
        grid-template-columns: minmax(620px, 0.85fr) minmax(560px, 0.95fr);
        gap: 12px;
        align-items: start;
      }

      .viewer-frame-wrap,
      .viewer-side-layout,
      .viewer-llm-panel,
      .viewer-output-panel {
        background: var(--panel-bg);
        border: 1px solid var(--panel-border);
        border-radius: 10px;
        overflow: hidden;
        box-shadow: 0 10px 24px rgba(34, 48, 71, 0.08);
      }

      .viewer-frame-wrap {
        display: flex;
        justify-content: center;
        align-items: flex-start;
      }

      .viewer-frame {
        display: block;
        width: 100%;
        min-width: 760px;
        height: calc(100vh - 96px);
        border: 0;
        background: #ffffff;
      }

      .viewer-side-layout {
        --viewer-output-width: minmax(0, 1.7fr);
        --viewer-summary-width: minmax(240px, 280px);
        position: sticky;
        top: 12px;
        height: calc(100vh - 96px);
        display: grid;
        grid-template-columns: var(--viewer-output-width) 10px var(--viewer-summary-width);
        gap: 0;
        background: transparent;
        border: 0;
        box-shadow: none;
      }

      .viewer-output-panel,
      .viewer-llm-panel {
        min-height: 0;
        height: 100%;
        display: grid;
      }

      .viewer-output-panel {
        grid-template-rows: auto minmax(0, 1fr);
        border-top-right-radius: 0;
        border-bottom-right-radius: 0;
        border-right: 0;
      }

      .viewer-side-resizer {
        position: relative;
        cursor: col-resize;
        background: transparent;
      }

      .viewer-side-resizer::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg, #eef3f8 0%, #dde6f0 100%);
      }

      .viewer-side-resizer::after {
        content: "";
        position: absolute;
        top: 50%;
        left: 50%;
        width: 4px;
        height: 56px;
        transform: translate(-50%, -50%);
        border-radius: 999px;
        background: #b9c7d8;
        box-shadow: -6px 0 0 #d3dce7, 6px 0 0 #d3dce7;
      }

      .viewer-llm-panel {
        display: grid;
        grid-template-rows: auto auto minmax(0, 1fr);
        border-top-left-radius: 0;
        border-bottom-left-radius: 0;
      }

      .viewer-panel-head,
      .viewer-llm-head {
        padding: 14px 16px 10px;
        border-bottom: 1px solid #e4eaf2;
        display: grid;
        gap: 5px;
      }

      .viewer-panel-head h2,
      .viewer-llm-head h2 {
        margin: 0;
        font-size: 15px;
      }

      .viewer-panel-head p,
      .viewer-llm-head p {
        margin: 0;
        font-size: 12px;
        line-height: 1.45;
        color: var(--text-sub);
      }

      .viewer-llm-meta {
        padding: 10px 16px;
        border-bottom: 1px solid #edf2f7;
        display: grid;
        gap: 8px;
      }

      .meta-card {
        border: 1px solid #e6ebf2;
        border-radius: 10px;
        background: #fafcff;
        padding: 10px 11px;
        display: grid;
        gap: 6px;
        align-content: start;
        align-self: start;
      }

      .meta-line {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 10px;
        font-size: 12px;
      }

      .meta-line strong {
        font-size: 12px;
      }

      .meta-line span {
        color: var(--text-sub);
      }

      .hierarchy-list {
        display: grid;
        gap: 8px;
      }

      .hierarchy-item {
        border: 1px solid var(--summary-border);
        border-radius: 10px;
        background: var(--summary-soft);
        display: grid;
        overflow: hidden;
      }

      .hierarchy-head {
        width: 100%;
        border: 0;
        background: transparent;
        padding: 9px 10px;
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 10px;
        cursor: pointer;
        text-align: left;
      }

      .hierarchy-head:hover {
        background: var(--summary-hover);
      }

      .hierarchy-head strong {
        font-size: 13px;
        color: var(--summary-strong);
      }

      .hierarchy-head-label {
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }

      .hierarchy-toggle {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 18px;
        color: var(--summary-toggle);
        font-size: 11px;
        transform: rotate(-90deg);
        transition: transform 0.18s ease;
      }

      .hierarchy-item.is-expanded .hierarchy-toggle {
        transform: rotate(0deg);
      }

      .hierarchy-score {
        font-size: 12px;
        font-weight: 700;
        color: var(--summary-score);
      }

      .facet-list {
        display: none;
        gap: 4px;
        padding: 0 10px 10px;
      }

      .hierarchy-item.is-expanded .facet-list {
        display: grid;
      }

      .facet-item {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 8px;
        font-size: 12px;
      }

      .facet-item span {
        color: var(--text-sub);
      }

      .viewer-llm-body {
        padding: 14px 16px 18px;
        overflow: auto;
        display: grid;
        gap: 12px;
        min-height: 0;
        align-content: start;
      }

      .viewer-output-body {
        padding: 14px 16px 18px;
        overflow: auto;
        min-height: 0;
        background: #fbfcfe;
      }

      .uniform-btn {
        min-height: 34px;
        border-radius: 9px;
        border: 1px solid #cfd8e4;
        background: #f8fbff;
        color: #244261;
        font-weight: 700;
        cursor: pointer;
      }

      .uniform-btn:disabled {
        cursor: wait;
        opacity: 0.7;
      }

      .llm-output {
        border: 1px solid #e6ebf2;
        border-radius: 10px;
        background: #fcfdff;
        padding: 14px 16px;
        font-size: 13px;
        line-height: 1.65;
      }

      .llm-output h1,
      .llm-output h2,
      .llm-output h3 {
        margin: 0 0 10px;
        color: #223047;
        line-height: 1.4;
      }

      .llm-output h1 {
        font-size: 18px;
      }

      .llm-output h2 {
        font-size: 16px;
      }

      .llm-output h3 {
        font-size: 14px;
      }

      .llm-output p {
        margin: 0 0 10px;
      }

      .llm-output ul {
        margin: 0 0 12px;
        padding-left: 18px;
      }

      .llm-output li {
        margin: 0 0 6px;
      }

      .llm-output strong {
        color: #1f3854;
      }

      .llm-output code {
        padding: 1px 5px;
        border-radius: 6px;
        background: #eef3f8;
        font-size: 12px;
      }

      .llm-status {
        margin: 0;
        font-size: 12px;
        color: var(--text-sub);
      }

      .viewer-error {
        margin: 24px auto;
        width: min(640px, calc(100vw - 24px));
        padding: 18px 20px;
        border-radius: 10px;
        border: 1px solid #f0d7d9;
        background: #fff4f4;
        color: #7e2333;
      }

      @media (max-width: 1180px) {
        .viewer-layout {
          grid-template-columns: minmax(0, 1fr);
        }

        .viewer-side-layout {
          position: static;
          height: auto;
          grid-template-columns: minmax(0, 1fr);
          gap: 12px;
        }

        .viewer-side-resizer {
          display: none;
        }

        .viewer-llm-panel {
          position: static;
          height: auto;
          border-radius: 10px;
        }

        .viewer-output-panel {
          height: auto;
          border-radius: 10px;
          border-right: 1px solid var(--panel-border);
        }

        .viewer-frame {
          min-width: 0;
          height: 74vh;
        }
      }
    </style>
  </head>
  <body>
    <main id="viewerRoot"></main>
    <script>
      (() => {
        const params = new URLSearchParams(window.location.search);
        const report = (params.get("report") || "").trim().toUpperCase();
        const clientId = Number(params.get("id") || "");

        const reportMap = {
          GOLDEN: {
            title: "GOLDEN 성격유형검사 리포트",
            path: "/artifacts/GOLDEN.html",
            llmSummaryText: "GOLDEN 리포트 점수 구조를 확인할 수 있습니다.",
            llmButtonText: "GOLDEN 해석 생성",
            theme: {
              accent: "#a76a24",
              summarySoft: "#fffaf3",
              summaryBorder: "#ead8bf",
              summaryHover: "rgba(167, 106, 36, 0.06)",
              summaryStrong: "#6f4312",
              summaryToggle: "#9a6424",
              summaryScore: "#a76a24",
            },
          },
          STS: {
            title: "STS 6요인 기질검사 리포트",
            path: "/artifacts/STS.html",
            llmSummaryText: "STS 리포트 점수 구조를 확인할 수 있습니다.",
            llmButtonText: "STS 해석 생성",
            theme: {
              accent: "#2b7d68",
              summarySoft: "#def5ee",
              summaryBorder: "#92cebf",
              summaryHover: "rgba(43, 125, 104, 0.08)",
              summaryStrong: "#195e4d",
              summaryToggle: "#195e4d",
              summaryScore: "#2b7d68",
            },
          },
        };

        const selected = reportMap[report];
        const root = document.getElementById("viewerRoot");
        if (!root) return;

        if (!selected) {
          root.innerHTML = '<section class="viewer-error">지원하지 않는 리포트입니다. (GOLDEN 또는 STS)</section>';
          return;
        }

        const sourceUrl = `${selected.path}?v=${Date.now()}`;
        root.innerHTML = `
          <section class="viewer-shell">
            <header class="viewer-top">
              <div>
                <p class="viewer-title">${selected.title}</p>
                <p class="viewer-sub">좌측은 리포트 원문, 우측은 결과 해석 문구와 점수 요약 패널입니다.</p>
              </div>
            </header>
            <section class="viewer-layout">
              <section class="viewer-frame-wrap">
                <iframe id="viewerFrame" class="viewer-frame" src="${sourceUrl}" title="${selected.title}"></iframe>
              </section>
              <section class="viewer-side-layout">
                <aside class="viewer-output-panel">
                  <header class="viewer-panel-head">
                    <h2>결과 해석 문구</h2>
                    <p>본 문구는 AI 생성 참고 자료이며, 최종 해석은 전문가의 판단을 권장합니다.</p>
                  </header>
                  <section class="viewer-output-body">
                    <div id="viewerLlmOutput" class="llm-output">오른쪽 점수 요약을 확인한 뒤 해석을 생성할 수 있습니다.</div>
                  </section>
                </aside>
                <div id="viewerSideResizer" class="viewer-side-resizer" aria-hidden="true"></div>
	                <aside class="viewer-llm-panel">
	                  <header class="viewer-llm-head">
	                    <h2>점수 요약</h2>
	                    <p>${selected.llmSummaryText}</p>
	                  </header>
	                  <section class="viewer-llm-meta">
	                    <button id="runGoldenLlmBtn" type="button" class="uniform-btn" disabled>${selected.llmButtonText}</button>
	                    <p id="viewerLlmStatus" class="llm-status">대기 중</p>
	                  </section>
                  <section class="viewer-llm-body">
                    <div id="viewerHierarchyCard" class="meta-card">점수 구조를 불러오는 중입니다.</div>
                  </section>
                </aside>
              </section>
            </section>
          </section>
        `;

        const hierarchyCard = document.getElementById("viewerHierarchyCard");
        const runBtn = document.getElementById("runGoldenLlmBtn");
        const llmStatus = document.getElementById("viewerLlmStatus");
        const llmOutput = document.getElementById("viewerLlmOutput");
        const sideLayout = root.querySelector(".viewer-side-layout");
        const sideResizer = document.getElementById("viewerSideResizer");
        const viewerFrame = document.getElementById("viewerFrame");
        const isGoldenReport = report === "GOLDEN";

        let llmContext = null;

        Object.entries(selected.theme || {}).forEach(([key, value]) => {
          const cssName = ({
            accent: "--accent",
            summarySoft: "--summary-soft",
            summaryBorder: "--summary-border",
            summaryHover: "--summary-hover",
            summaryStrong: "--summary-strong",
            summaryToggle: "--summary-toggle",
            summaryScore: "--summary-score",
          })[key];
          if (cssName) {
            root.style.setProperty(cssName, value);
          }
        });

        const escapeHtml = (value) =>
          String(value ?? "")
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#39;");

        const formatScore = (value) => {
          const num = Number(value);
          if (!Number.isFinite(num)) return "-";
          if (report === "GOLDEN") {
            return `${Math.round(num)} / 100`;
          }
          return `${num.toFixed(2)} / 100`;
        };

        const formatPromptScore = (value) => {
          const num = Number(value);
          return Number.isFinite(num) ? String(Math.round(num)) : "-";
        };

        const formatKoreanDate = (value) => {
          const text = String(value ?? "").trim();
          if (!text) return "-";
          const date = new Date(text);
          if (Number.isNaN(date.getTime())) return text;
          const parts = new Intl.DateTimeFormat("sv-SE", {
            timeZone: "Asia/Seoul",
            year: "numeric",
            month: "2-digit",
            day: "2-digit",
            hour: "2-digit",
            minute: "2-digit",
            hour12: false,
          }).formatToParts(date);
          const pick = (type) => parts.find((part) => part.type === type)?.value || "";
          const year = pick("year");
          const month = pick("month");
          const day = pick("day");
          const hour = pick("hour");
          const minute = pick("minute");
          if (!year || !month || !day) return text;
          return `${year}-${month}-${day} ${hour || "00"}:${minute || "00"}`;
        };

        const renderMarkdown = (value) => {
          const source = String(value ?? "").replace(/\r\n/g, "\n").trim();
          if (!source) return "<p>응답이 비어 있습니다.</p>";

          const applyInline = (text) => escapeHtml(text)
            .replace(/`([^`]+)`/g, "<code>$1</code>")
            .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");

          const lines = source.split("\n");
          const blocks = [];
          let paragraphLines = [];
          let listItems = [];

          const flushParagraph = () => {
            if (!paragraphLines.length) return;
            blocks.push(`<p>${paragraphLines.map((line) => applyInline(line)).join("<br />")}</p>`);
            paragraphLines = [];
          };

          const flushList = () => {
            if (!listItems.length) return;
            blocks.push(`<ul>${listItems.map((item) => `<li>${applyInline(item)}</li>`).join("")}</ul>`);
            listItems = [];
          };

          lines.forEach((rawLine) => {
            const line = rawLine.trim();
            if (!line) {
              flushParagraph();
              flushList();
              return;
            }
            const heading = line.match(/^(#{1,3})\s+(.+)$/);
            if (heading) {
              flushParagraph();
              flushList();
              const level = heading[1].length;
              blocks.push(`<h${level}>${applyInline(heading[2])}</h${level}>`);
              return;
            }
            const bullet = line.match(/^[-*]\s+(.+)$/);
            if (bullet) {
              flushParagraph();
              listItems.push(bullet[1]);
              return;
            }
            flushList();
            paragraphLines.push(line);
          });

          flushParagraph();
          flushList();
          return blocks.join("");
        };

        const renderHierarchy = (payload) => {
          if (!hierarchyCard) return;
          const hierarchy = Array.isArray(payload?.hierarchy) ? payload.hierarchy : [];
          const client = payload?.client || {};
          hierarchyCard.innerHTML = `
            <div class="meta-line"><strong>내담자</strong><span>${escapeHtml(client.name || "-")}</span></div>
            <div class="meta-line"><strong>검사</strong><span>${escapeHtml(payload?.custom_test_name || "-")}</span></div>
            <div class="meta-line"><strong>채점 시각</strong><span>${escapeHtml(formatKoreanDate(payload?.scored_at))}</span></div>
            <div class="hierarchy-list">
              ${hierarchy.map((scale, index) => `
                <article class="hierarchy-item">
                  <button type="button" class="hierarchy-head" data-role="toggle-hierarchy-item" aria-expanded="false">
                    <span class="hierarchy-head-label">
                      <span class="hierarchy-toggle">▼</span>
                      <strong>${escapeHtml(scale.code)} · ${escapeHtml(scale.name)}</strong>
                    </span>
                    <span class="hierarchy-score">${escapeHtml(formatScore(scale.score))}</span>
                  </button>
                  <div class="facet-list">
                    ${(Array.isArray(scale.children) ? scale.children : []).map((facet) => `
                      <div class="facet-item">
                        <span>${escapeHtml(facet.code)} · ${escapeHtml(facet.name)}</span>
                        <strong>${escapeHtml(formatScore(facet.score))}</strong>
                      </div>
                    `).join("")}
                  </div>
                </article>
              `).join("")}
            </div>
          `;
        };

        if (hierarchyCard) {
          hierarchyCard.addEventListener("click", (event) => {
            const toggleBtn = event.target.closest('[data-role="toggle-hierarchy-item"]');
            if (!(toggleBtn instanceof HTMLElement)) return;
            const item = toggleBtn.closest(".hierarchy-item");
            if (!(item instanceof HTMLElement)) return;
            const isExpanded = item.classList.toggle("is-expanded");
            toggleBtn.setAttribute("aria-expanded", isExpanded ? "true" : "false");
          });
        }

        const buildGoldenPrompt = (payload) => {
          const client = payload?.client || {};
          const hierarchy = Array.isArray(payload?.hierarchy) ? payload.hierarchy : [];
          const condensedLines = hierarchy.flatMap((scale) => {
            const lines = [
              `${scale.code || "-"} ${scale.name || "-"} : ${formatPromptScore(scale.score)}`,
            ];
            (Array.isArray(scale.children) ? scale.children : []).forEach((facet) => {
              lines.push(`- ${facet.code || "-"} ${facet.name || "-"} : ${formatPromptScore(facet.score)}`);
            });
            return lines;
          });
          return [
            `${client.name || "내담자"}의 GOLDEN 성격유형검사 결과를 보호자/상담 입장에서 해석해줘.`,
            `상위 척도와 하위 척도 관계를 유지해서 설명하고, 점수 차이가 큰 부분을 먼저 요약해줘.`,
            `상위 척도를 설명할 때 해당 하위척도를 함께 언급하면서 관련성을 설명해줘.`,
            `필요하면 고차원적으로 보이는 특징이 있으면 설명해줘.`,
            `점수 데이터:`,
            condensedLines.join("\n"),
          ].join("\n\n");
        };

        const setStatus = (text) => {
          if (llmStatus) llmStatus.textContent = text;
        };

        const centerReportWithinFrame = () => {
          if (!(viewerFrame instanceof HTMLIFrameElement)) return;
          try {
            const frameDoc = viewerFrame.contentDocument;
            const frameBody = frameDoc?.body;
            if (!frameDoc || !frameBody) return;

            frameBody.style.margin = "0";
            frameBody.style.overflow = "auto";
            frameBody.style.background = "#ffffff";

            let styleEl = frameDoc.getElementById("viewerReportCenterStyle");
            if (!(styleEl instanceof HTMLStyleElement)) {
              styleEl = frameDoc.createElement("style");
              styleEl.id = "viewerReportCenterStyle";
              frameDoc.head.appendChild(styleEl);
            }
            styleEl.textContent = `
              body > div.offset[style*="position:relative"][style*="width:793px"],
              body > div.offset[style*="position:relative"][style*="width:794px"] {
                display: block !important;
                margin-left: auto !important;
                margin-right: auto !important;
                left: auto !important;
                right: auto !important;
              }
            `;
          } catch {
            // Ignore iframe access issues.
          }
        };

        const initSideResize = () => {
          if (!(sideLayout instanceof HTMLElement) || !(sideResizer instanceof HTMLElement)) return;
          let dragging = false;

          const stopDragging = () => {
            dragging = false;
            document.body.style.userSelect = "";
            document.body.style.cursor = "";
          };

          const updateWidths = (clientX) => {
            const rect = sideLayout.getBoundingClientRect();
            const minSummary = 220;
            const maxSummary = 380;
            const handleWidth = 10;
            const nextSummary = Math.min(maxSummary, Math.max(minSummary, rect.right - clientX));
            const nextOutput = Math.max(320, rect.width - nextSummary - handleWidth);
            sideLayout.style.setProperty("--viewer-output-width", `${nextOutput}px`);
            sideLayout.style.setProperty("--viewer-summary-width", `${nextSummary}px`);
          };

          sideResizer.addEventListener("mousedown", (event) => {
            if (window.innerWidth <= 1180) return;
            dragging = true;
            document.body.style.userSelect = "none";
            document.body.style.cursor = "col-resize";
            updateWidths(event.clientX);
          });

          window.addEventListener("mousemove", (event) => {
            if (!dragging) return;
            updateWidths(event.clientX);
          });

          window.addEventListener("mouseup", stopDragging);
          window.addEventListener("mouseleave", stopDragging);
        };

        const loadContext = async () => {
          if (!Number.isFinite(clientId) || clientId <= 0) {
            if (hierarchyCard) hierarchyCard.textContent = "client_id가 없어 LLM 패널을 초기화할 수 없습니다.";
            return;
          }
          try {
            const resp = await fetch(`/api/admin/clients/${encodeURIComponent(String(clientId))}/report-llm-context?report=${encodeURIComponent(report)}`, {
              credentials: "same-origin",
            });
            const data = await resp.json();
            if (!resp.ok) {
              throw new Error(data?.detail || "점수 구조를 불러오지 못했습니다.");
            }
            llmContext = data;
            renderHierarchy(data);
            if (runBtn) {
              runBtn.disabled = !isGoldenReport;
              runBtn.title = isGoldenReport ? "" : "현재는 GOLDEN 리포트만 AI 해석 생성이 가능합니다.";
            }
            if (!isGoldenReport && llmOutput) {
              llmOutput.innerHTML = "<p>STS는 현재 점수 요약만 지원합니다. AI 해석 생성은 아직 GOLDEN만 가능합니다.</p>";
            }
            setStatus("점수 구조 로드 완료");
          } catch (error) {
            if (hierarchyCard) hierarchyCard.textContent = error.message || "점수 구조를 불러오지 못했습니다.";
            setStatus("점수 구조 로드 실패");
          }
        };

        const runGoldenLlm = async () => {
          if (!llmContext || !runBtn || !llmOutput) return;
          runBtn.disabled = true;
          llmOutput.innerHTML = "<p>LLM 해석을 생성하는 중입니다...</p>";
          setStatus("GOLDEN 해석 생성 중");
          try {
            const resp = await fetch(`/api/admin/clients/${encodeURIComponent(String(clientId))}/report-llm-chat`, {
              method: "POST",
              credentials: "same-origin",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                prompt: buildGoldenPrompt(llmContext),
                selected_test: "GOLDEN",
                model_name: "jinkyeongk/Midm-2.0-Base-Instruct-AWQ",
                base_url: "http://127.0.0.1:8000/v1",
                api_key: "dummy",
                temperature: 0.2,
                top_p: 0.9,
                max_tokens: 1000,
                timeout: 120,
                mock_mode: false,
              }),
            });
            const data = await resp.json();
            if (!resp.ok || !data?.ok) {
              throw new Error(data?.error || data?.detail || "LLM 응답 생성에 실패했습니다.");
            }
            llmOutput.innerHTML = renderMarkdown(data.response || "응답이 비어 있습니다.");
            setStatus("GOLDEN 해석 생성 완료");
          } catch (error) {
            llmOutput.innerHTML = renderMarkdown(error.message || "LLM 응답 생성에 실패했습니다.");
            setStatus("GOLDEN 해석 생성 실패");
          } finally {
            runBtn.disabled = false;
          }
        };

        if (runBtn) {
          runBtn.addEventListener("click", runGoldenLlm);
        }

        if (viewerFrame) {
          viewerFrame.addEventListener("load", centerReportWithinFrame);
        }

        initSideResize();
        loadContext();
      })();
    </script>
  </body>
</html>
