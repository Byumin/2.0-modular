<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>관리자 로그인</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body data-page="admin-login">
    <main class="page">
      <section class="card">
        <p class="eyebrow">ADMIN</p>
        <h1>관리자 로그인</h1>
        <p class="sub">관리자 ID와 비밀번호로 로그인하세요.</p>

        <form id="adminLoginForm" class="form" novalidate>
          <label for="admin_id">관리자 ID</label>
          <input id="admin_id" name="admin_id" type="text" autocomplete="username" required />

          <label for="admin_pw">비밀번호</label>
          <input id="admin_pw" name="admin_pw" type="password" autocomplete="current-password" required />

          <button id="adminLoginBtn" type="submit">로그인</button>
          <p id="adminLoginMessage" class="message" aria-live="polite"></p>
        </form>
      </section>
    </main>

    <script src="/static/admin.js"></script>
  </body>
</html>
