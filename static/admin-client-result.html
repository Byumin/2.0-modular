<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>내담자 상세 결과 조회</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body data-page="admin-client-result">
    <main class="page dashboard-page">
      <section class="card dashboard-card">
        <header class="dashboard-topbar">
          <div>
            <p class="eyebrow">CLIENT RESULT VIEW</p>
            <h1>내담자 상세 결과 조회</h1>
            <p class="sub">내담자 1명의 검사 이력, 척도 선택, 결과 시각화를 한 화면에서 확인합니다.</p>
          </div>
          <div class="row-actions top-actions">
            <a id="backToClientDetailBtn" class="ghost-btn" href="/admin/client-detail">내담자 상세</a>
            <a class="ghost-btn" href="/admin/clients">내담자 목록</a>
          </div>
        </header>

        <section class="summary-grid client-result-page-summary-grid">
          <article class="summary-card client-focus-card">
            <p class="summary-label">내담자</p>
            <p id="resultClientName" class="summary-value">-</p>
            <p id="resultClientIdentity" class="field-info">-</p>
          </article>
          <article class="summary-card">
            <p class="summary-label">최근 검사일</p>
            <p id="resultClientLastAssessedOn" class="summary-value">-</p>
          </article>
          <article class="summary-card is-highlight">
            <p class="summary-label">선택 검사</p>
            <p id="resultClientSelectedTest" class="summary-value">검사 선택 필요</p>
          </article>
          <article class="summary-card">
            <p class="summary-label">상태</p>
            <p id="resultClientStatus" class="summary-value">-</p>
          </article>
        </section>
        <p id="resultClientTestMeta" class="field-info client-result-top-meta">-</p>

        <section class="client-result-view-grid">
          <article class="panel-block panel-card client-result-tree-panel">
            <div class="panel-title-row">
              <h2>척도 선택 트리</h2>
            </div>
            <p id="clientResultScaleTreeMeta" class="field-info">검사 기준 척도 구조</p>
            <div class="row-actions client-scale-tree-actions">
              <button id="clientResultSelectAllScalesBtn" type="button" class="uniform-btn ghost-btn">전체 선택</button>
              <button id="clientResultClearScalesBtn" type="button" class="uniform-btn ghost-btn">선택 해제</button>
            </div>
            <div id="clientResultScaleTreeEmpty" class="info-box hidden">표시할 척도 구조가 없습니다.</div>
            <div class="scroll-area client-result-tree-scroll">
              <section id="clientResultScaleTree" class="client-result-scale-tree"></section>
            </div>
          </article>

          <article class="panel-block panel-card client-result-detail-panel">
            <div class="panel-title-row">
              <h2 id="clientResultSelectedTestTitle">검사를 선택하세요</h2>
            </div>
            <p id="clientResultSelectedTestMeta" class="field-info"></p>

            <section class="client-result-detail-block client-result-selection-block">
              <div class="client-result-filter-head">
                <label>선택된 척도</label>
                <p id="clientResultScaleFilterLegend" class="field-info">전체 척도 프로파일</p>
              </div>
              <div id="clientResultSelectedScaleSummary" class="client-result-selected-summary"></div>
            </section>

            <section class="client-result-detail-block client-result-visual-block">
              <p class="summary-label section-label">시각화 결과</p>
              <section class="client-result-chart-grid">
                <article class="chart-wrap client-result-chart-card">
                  <div class="client-result-chart-card-head">
                    <p class="summary-label">프로파일 차트</p>
                    <p class="field-info">선택된 척도 결과를 parent 검사 기준으로 한눈에 비교합니다.</p>
                  </div>
                  <div class="client-result-chart-stage">
                    <svg id="clientResultProfileChart" viewBox="0 0 640 340" preserveAspectRatio="none"></svg>
                  </div>
                </article>
              </section>
            </section>

            <div id="clientResultDetailEmpty" class="info-box hidden">검사를 선택하면 결과가 표시됩니다.</div>
          </article>
        </section>

        <p id="clientResultPageMessage" class="message" aria-live="polite"></p>
      </section>
    </main>

    <script src="/static/vendor/d3.min.js"></script>
    <script src="/static/admin.js?v=20260330-3"></script>
  </body>
</html>
