<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>검사 상세/설정</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body data-page="admin-test-detail">
    <main class="page dashboard-page">
      <section class="card dashboard-card">
        <header class="dashboard-topbar">
          <div>
            <p class="eyebrow">TEST DETAIL</p>
            <h1>검사 상세</h1>
            <p class="sub">생성된 검사 구성 정보를 확인합니다.</p>
          </div>
          <div class="row-actions top-actions">
            <a class="ghost-btn" href="/admin/workspace">대시보드</a>
          </div>
        </header>

        <section class="panel-block no-top-line">
          <form id="testDetailForm" class="form" novalidate>
            <label for="detail_custom_test_name">검사명</label>
            <input id="detail_custom_test_name" type="text" maxlength="120" readonly />

            <div class="detail-meta" id="detailMeta"></div>

            <div class="summary-grid detail-summary-grid">
              <article class="summary-card detail-summary-card">
                <p class="summary-label">선택 척도 수</p>
                <p id="detailSelectedScaleCount" class="summary-value detail-summary-value">-</p>
              </article>
              <article class="summary-card detail-summary-card">
                <p class="summary-label">선택 척도 기준 문항 수</p>
                <p id="detailSelectedItemCount" class="summary-value detail-summary-value">-</p>
              </article>
              <article class="summary-card detail-summary-card">
                <p class="summary-label">응답 형식</p>
                <p id="detailResponseType" class="summary-value detail-summary-value detail-response-type">-</p>
              </article>
            </div>

            <label>선택된 척도</label>
            <div id="detailScaleList" class="check-list"></div>

            <p id="testDetailMessage" class="message" aria-live="polite"></p>
          </form>
        </section>
      </section>
    </main>

    <script src="/static/admin.js"></script>
  </body>
</html>
